name: Checks Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  app:
    name: App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

  image-tagger-worker:
    name: Image tagger worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./image-tagger-worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: image-tagger-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit
        run: npm audit --audit-level=high

      - name: Type check
        run: npm run typecheck

  image-tagger-api:
    name: Image tagger API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./image-tagger-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: image-tagger-api/.python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: image-tagger-api/uv.lock

      - name: Ruff lint
        run: uvx --from ruff==0.15.17 ruff check .

      - name: Ruff format
        run: uvx --from ruff==0.15.17 ruff format --check .

      - name: Compile Python files
        run: python -m compileall src

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - app
      - image-tagger-worker
      - image-tagger-api
    if: always()
    steps:
      - name: Check if all jobs succeeded
        run: |
          if [ "${{ needs.app.result }}" != "success" ] || \
             [ "${{ needs.image-tagger-worker.result }}" != "success" ] || \
             [ "${{ needs.image-tagger-api.result }}" != "success" ]; then
            echo "Some checks failed!"
            exit 1
          fi

          echo "All checks passed!"
